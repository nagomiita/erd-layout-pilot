name: Release VSIX

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Resolve release version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "vsix=erd-layout-pilot-${VERSION}.vsix" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.existing.outputs.exists == 'false'
        run: npm ci

      - name: Build
        if: steps.existing.outputs.exists == 'false'
        run: npm run build

      - name: Package VSIX
        if: steps.existing.outputs.exists == 'false'
        run: npm run package:vsix

      - name: Create release and upload VSIX
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          VSIX: ${{ steps.version.outputs.vsix }}
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          gh release create "$TAG" "$VSIX" \
            --target "$SHA" \
            --title "$TAG" \
            --notes "Automated release for ERD Layout Pilot ${VERSION}"

      - name: Report skipped release
        if: steps.existing.outputs.exists == 'true'
        run: echo "Release ${{ steps.version.outputs.tag }} already exists; skipping."
